version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: chauffeur-db
    restart: unless-stopped
    ports:
      - "5433:5432" # Expose on 5433 to match your existing local DB port
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sarj123
      POSTGRES_DB: sarj_chauffeur
    volumes:
      - postgres_data:/var/lib/postgresql/data
      

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chauffeur-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the docker network hostname 'db' and internal port '5432'
      DATABASE_URL: "postgresql://postgres:sarj123@db:5432/sarj_chauffeur"
    depends_on:
      - db

volumes:
  postgres_data:
